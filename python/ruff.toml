# ruff.toml — recommended ruleset that enforces the opinions the `python` plugin's
# skills teach. OPT-IN: the plugin's hooks run your repo's OWN ruff config, not this
# file. To enforce these too, either copy this into your repo or point ruff at it:
#   ruff check --config /path/to/this/ruff.toml
# Every rule below is STABLE — no `preview = true` required.
#
# Adjust `target-version` to your project's minimum (it gates pyupgrade fixes such as
# UP045 `X | None`, which needs 3.10+). The `py311` default below is a conservative
# floor that still enables those rewrites; raise it to match your project.

target-version = "py311"
line-length = 100

[lint]
select = [
    "E",       # pycodestyle errors — incl. E722 (no bare except)
    "W",       # pycodestyle warnings
    "F",       # pyflakes — unused imports/vars, undefined names
    "I",       # isort — imports grouped & sorted (stdlib / third-party / local)
    "B",       # flake8-bugbear — incl. B904 (raise ... from e)
    "BLE",     # flake8-blind-except — BLE001 (no blind `except Exception`)
    "ANN",     # flake8-annotations — type hints on every arg/return; ANN401 discourages Any
    "UP",      # pyupgrade — UP006/UP007/UP035/UP045: X|None, list[str], drop typing.List
    "T20",     # flake8-print — T201/T203: no print()/pprint() for logging
    "G",       # flake8-logging-format — G004: no f-strings in logging calls
    "D",       # pydocstyle — Google-style docstrings (presence + style); see convention below
    "PLC0415", # Pylint — import-outside-top-level: all imports at top (no inline imports)
    "ERA",     # eradicate — ERA001: no commented-out code / backward-compat cruft
    "PT",      # flake8-pytest-style — pytest.raises(match=), no assert-in-except, conventions
]

ignore = [
    "D203",  # conflicts with D211 (google convention prefers no blank line before class docstring)
    "D212",  # conflicts with D213 (let the google convention place the multi-line summary)
    # Intentionally NOT selected (too noisy for a shared config): PLR0913, PLR0912, PLR0915, PLR2004
]

[lint.pydocstyle]
# REQUIRED for Google-style docstrings — also auto-disables the conflicting D rules.
convention = "google"

[lint.flake8-annotations]
mypy-init-return = true    # don't force `-> None` on __init__
suppress-dummy-args = true # allow an unannotated `_` throwaway arg
# allow-star-arg-any = true  # uncomment to relax ANN401 on *args/**kwargs only

[lint.flake8-pytest-style]
# Force `match=` on pytest.raises so tests aren't overly broad (drives PT011).
# Use ["BaseException"] to require match= on every raised type.
raises-require-match-for = ["BaseException", "Exception", "ValueError", "OSError"]

[lint.isort]
known-first-party = []  # add your local package name(s) here for correct import grouping

# ---------------------------------------------------------------------------
# Test files: relax only missing-docstring noise. ANN (typed tests), PLC0415
# (no inline imports), D200 (single-line docstrings fit one line) and the PT
# pytest conventions stay ENFORCED — they're part of the testing standard.
# (per-file overrides can only *ignore* rules, never add beyond the global select.)
# ---------------------------------------------------------------------------
# Globs are `**/`-prefixed so they match regardless of the project root — important
# because the plugin may pass this file via `--config` from outside the repo tree.
[lint.extend-per-file-ignores]
"**/test_*.py"   = ["D100", "D101", "D102", "D103", "D104"]
"**/*_test.py"   = ["D100", "D101", "D102", "D103", "D104"]
"**/tests/**"    = ["D100", "D101", "D102", "D103", "D104"]
"**/conftest.py" = ["D100", "D103"]
