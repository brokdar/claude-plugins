[mypy]
# Strict fallback config for mypy — used ONLY when the project has no mypy config.
# Equivalent to --strict plus a few extras, tolerant of missing imports for uvx runs.
# Verified against mypy's config_file.html and command_line.html.

# Untyped definitions and calls
disallow_untyped_defs = True
disallow_incomplete_defs = True
disallow_untyped_calls = True
disallow_untyped_decorators = True
check_untyped_defs = True

# Any suppression — the practically important Any leakage
disallow_any_generics = True
disallow_subclassing_any = True
warn_return_any = True
# disallow_any_unimported is intentionally OMITTED: it flags every symbol coming from
# an unfollowed import, which — combined with ignore_missing_imports below — would
# flood ephemeral (uvx) runs that can't resolve third-party imports. disallow_any_expr
# and disallow_any_explicit are also omitted (not part of --strict; extremely noisy).

# Optional / None handling (implicit_optional defaults to False since mypy 0.981)
implicit_optional = False
strict_optional = True

# Equality
strict_equality = True

# Warnings
warn_redundant_casts = True
warn_unused_ignores = True
warn_unreachable = True
warn_unused_configs = True
warn_no_return = True

# Re-export discipline (no_ prefix inversion of implicit_reexport = False)
no_implicit_reexport = True

# Extra technically-correct checks (part of --strict)
extra_checks = True

# Import handling — REQUIRED for ephemeral / uvx runs without project deps:
# treat unresolvable third-party / project imports as Any instead of erroring.
ignore_missing_imports = True
